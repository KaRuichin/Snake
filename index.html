<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>🐍 贪吃蛇游戏</h1>
        <div class="game-info">
            <span>得分: <span id="score">0</span></span>
            <span>最高分: <span id="highScore">0</span></span>
        </div>
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        <div class="controls">
            <button id="startBtn">开始游戏</button>
            <button id="pauseBtn" disabled>暂停</button>
        </div>
        <div class="settings">
            <label class="toggle-switch">
                <input type="checkbox" id="autoResumeToggle" checked>
                <span class="slider"></span>
                <span class="toggle-label">失焦暂停后自动继续</span>
            </label>
            <div class="countdown-setting">
                <label for="countdownSeconds">倒计时:</label>
                <input type="number" id="countdownSeconds" value="3" min="1" max="10">
                <span>秒</span>
            </div>
        </div>
        <div class="instructions">
            <p>使用 <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> 方向键控制蛇的移动</p>
            <p>按 <kbd>空格</kbd> 开始游戏 / 暂停继续 / 重新开始</p>
        </div>
    </div>
    <script src="game.js"></script>
</body>

</html>
